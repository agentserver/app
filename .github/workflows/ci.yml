name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go vet ./...
      - run: go test -race -short -count=1 ./...

  test-integration:
    runs-on: ubuntu-latest
    needs: test-linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go test -race -count=1 -tags=integration ./test/integration/...

  build-windows:
    runs-on: ubuntu-latest
    needs: test-linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: make cross-windows
      - uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: dist/windows/

  test-extension:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd extensions/agentserver-app && npm ci && npm test
